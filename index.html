<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang Chủ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f2f2f2;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 12px rgba(0,0,0,.2);
    text-align:center;
}

h1{
    color:#0066cc;
    margin-bottom:20px;
}

.info{
    font-size:22px;
    margin:10px 0;
}

h2{
    margin:30px 0 20px;
    color:#333;
}

.images{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.images img{
    width:400px;
    max-width:100%;
    border-radius:10px;
    border:2px solid #333;
    box-shadow:0 3px 8px rgba(0,0,0,.3);
}

.button{
    display:inline-block;
    margin-top:30px;
    background:#007bff;
    color:white;
    text-decoration:none;
    padding:15px 30px;
    border-radius:8px;
    font-size:20px;
    transition:.3s;
}

.button:hover{
    background:#0056b3;
}

@media(max-width:768px){

.images{
    flex-direction:column;
    align-items:center;
}

.info{
    font-size:18px;
}

.button{
    width:100%;
}

}
</style>

</head>

<body>

</html>
